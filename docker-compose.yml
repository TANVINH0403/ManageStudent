version: '3.8'

services:
  db:
    image: postgres:17
    container_name: managestudent-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1" # Password hiện tại của bạn trong appsettings.Development.json
      POSTGRES_DB: ManageStudentDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: 
      context: ./API
      dockerfile: Dockerfile
    container_name: managestudent-api
    depends_on:
      - db
    ports:
      - "5050:8080"
    environment:
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=ManageStudentDb;Username=postgres;Password=1
      # Khai báo cấu hình JWT tuỳ chỉnh nếu cần, nếu không nó sẽ lấy từ appsettings.json
    volumes:
      - api-avatars:/app/wwwroot/avatars
      - api-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: managestudent-frontend
    depends_on:
      - api
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  pgdata:
  api-avatars:
  api-uploads:
